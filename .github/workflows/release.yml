name: "Release"

# Build the signed-for-update (but NOT yet Authenticode-signed) Windows
# installer + updater manifest and attach them to a DRAFT GitHub Release.
#
# Required GitHub secrets:
#   TAURI_SIGNING_PRIVATE_KEY           minisign private key (pairs with the
#                                       plugins.updater.pubkey in tauri.conf.json)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  password for that key (empty string if none)
#   GITHUB_TOKEN                        provided automatically by Actions
#
# NOT configured yet (the installer ships UNSIGNED for now): Authenticode /
# Azure Trusted Signing. When the user has an Azure cert, add
#   bundle.windows.signCommand in tauri.conf.json + the AZURE_* secrets, and
#   uncomment them in the env block below.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      # whisper-rs-sys' cmake build produces paths that exceed Windows MAX_PATH
      # (260 chars). Enable long paths + use a short target dir to stay under it.
      - name: Enable long paths (Windows)
        shell: pwsh
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force
          git config --system core.longpaths true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Shorten build path (Windows)
        shell: pwsh
        run: |
          $drive = Split-Path -Qualifier $env:GITHUB_WORKSPACE
          $targetDir = "$drive\t"
          New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
          echo "CARGO_TARGET_DIR=$targetDir" >> $env:GITHUB_ENV

      - name: Install frontend dependencies
        run: npm ci

      - name: Build + release (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater (minisign) signing — required so latest.json is signed and
          # the in-app updater accepts the artifact.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Authenticode (Azure Trusted Signing) — add later. Uncomment + set the
          # AZURE_* secrets and bundle.windows.signCommand in tauri.conf.json.
          # AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          # AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          # AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          # Disable -march=native / SIMD above SSE4.2 for the broadest CPU
          # compatibility — whisper.cpp CPU inference otherwise SIGILLs on old
          # CPUs lacking AVX/FMA. The default model (Parakeet V3) runs on ONNX +
          # DirectML and is unaffected.
          GGML_NATIVE: "OFF"
          GGML_AVX: "OFF"
          GGML_AVX2: "OFF"
          GGML_FMA: "OFF"
          GGML_F16C: "OFF"
        with:
          # BROAD COMPAT: whisper CPU + ONNX on DirectML (GPU-accelerated for the
          # default Parakeet V3 model) — runs on any Windows GPU, no CUDA needed.
          # A CUDA/Vulkan GPU-whisper variant could be added as a second matrix
          # entry later.
          args: "--features engines"
          tagName: app-v__VERSION__
          releaseName: "Blip v__VERSION__"
          releaseDraft: true
          prerelease: false
