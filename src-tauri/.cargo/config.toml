# Build configuration for whisper-rs-sys (Vulkan GPU backend).
#
# GPU whisper runs on VULKAN (universal — NVIDIA/AMD/Intel), not CUDA. Building
# the `whisper-vulkan` feature needs the Vulkan SDK at build time (glslc + Vulkan
# headers + loader). Install it locally from https://vulkan.lunarg.com (sets
# VULKAN_SDK); CI installs it via humbletim/install-vulkan-sdk. No CUDA / nvcc /
# arch list is required.
